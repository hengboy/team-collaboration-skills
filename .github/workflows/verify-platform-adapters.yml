name: Verify Platform Adapters

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify skill and platform adapter sync
        run: bash ./scripts/verify-platform-adapters.sh
